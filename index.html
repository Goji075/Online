<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koyocasino | Premium Realtime Casino</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.5/dist/umd/supabase.umd.js"></script>
    <style>
        :root {
            --bg-dark: #0f212e;
            --bg-panel: #1a2c38;
            --bg-card: #213743;
            --primary: #00e701;
            --primary-hover: #00b400;
            --text-main: #ffffff;
            --text-muted: #b1b6c6;
            --accent-blue: #2f4553;
            --danger: #ff4b4b;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; background-color: var(--bg-dark); color: var(--text-main); }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: var(--bg-panel); border-bottom: 2px solid var(--accent-blue); }
        .logo { font-size: 22px; font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        .balance-box { background-color: var(--bg-dark); padding: 8px 15px; border-radius: 6px; font-weight: bold; border: 1px solid var(--accent-blue); }
        .container { display: flex; flex-direction: column; max-width: 1400px; margin: 15px auto; gap: 15px; padding: 0 15px; }
        .sidebar { width: 100%; background-color: var(--bg-panel); padding: 15px; border-radius: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
        .menu-btn { flex: 1 1 calc(50% - 8px); padding: 12px; background: var(--bg-dark); border: 1px solid var(--accent-blue); color: var(--text-muted); text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 6px; }
        .menu-btn.active { background-color: var(--bg-card); color: var(--text-main); border-color: var(--primary); }
        .game-window { flex-grow: 1; background-color: var(--bg-panel); border-radius: 12px; padding: 20px; min-height: 450px; }
        .btn-primary { background-color: var(--primary); color: #0f212e; border: none; padding: 12px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; }
        input { background-color: var(--bg-dark); border: 2px solid var(--accent-blue); color: white; padding: 12px; border-radius: 6px; margin-bottom: 15px; width: 100%; }
        .login-container { max-width: 400px; margin: 20px auto; background: var(--bg-card); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .error-notice { background: rgba(255,75,75,0.1); border: 1px solid var(--danger); color: var(--danger); padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 12px; word-break: break-all; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Koyocasino</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div id="userInfo" style="color: var(--text-muted); font-weight: 600; font-size: 14px;"></div>
            <div class="balance-box">残高: $<span id="balanceDisplay">0.00</span></div>
        </div>
    </header>

    <div class="container">
        <div class="sidebar" id="sidebarArea" style="display: none;">
            <button class="menu-btn active" id="btn-games" onclick="switchTab('games')">🎮 ロビー</button>
            <button class="menu-btn" onclick="logout()">🚪 ログアウト</button>
        </div>
        <div class="game-window" id="mainContent">
            <p style="text-align:center; color:var(--text-muted);">システム起動中...</p>
        </div>
    </div>

    <script>
        // 設定値
        const SUPABASE_URL = "https://canlzehspgwnpxirlbhq.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_xnQVo-rDESnpxmiIrDPsSA_W24zrIGq";
        
        let supabaseClient = null;
        let currentUser = null;
        let currentProfile = null;
        let initErrorMsg = null;

        // 起動処理
        window.onload = async () => {
            // 1. まずクライアントを作ってみる
            try {
                if (!window.supabase) {
                    throw new Error("Supabaseの外部ライブラリの読み込みに失敗しています。ネット回線かURLを確認してください。");
                }
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } catch (e) {
                initErrorMsg = e.message;
            }

            // 2. ログイン状態のチェック（失敗しても止まらないようにする）
            if (supabaseClient) {
                try {
                    const { data: { user }, error } = await supabaseClient.auth.getUser();
                    if (error) throw error;
                    
                    if (user) {
                        currentUser = user;
                        document.getElementById('sidebarArea').style.display = 'flex';
                        await fetchProfile();
                        switchTab('games');
                        return; // ログイン成功ならここで終了
                    }
                } catch (e) {
                    initErrorMsg = "認証エラー: " + e.message;
                }
            }

            // 3. ログインしていない、またはエラーがあった場合は「強制的に」ログイン画面を出す
            renderLoginScreen();
        };

        async function fetchProfile() {
            try {
                let { data } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
                if (data) {
                    currentProfile = data;
                    document.getElementById('balanceDisplay').innerText = data.balance.toFixed(2);
                    document.getElementById('userInfo').innerText = `@${data.username}`;
                }
            } catch(e) {}
        }

        function switchTab(tab) {
            const content = document.getElementById('mainContent');
            if (tab === 'games') {
                content.innerHTML = `
                    <h2>🎮 ゲーム一覧</h2>
                    <p style="color:var(--primary)">パブリッシュキーでの接続に成功しました！</p>
                `;
            }
        }

        function renderLoginScreen() {
            document.getElementById('sidebarArea').style.display = 'none';
            
            // エラーがある場合は上部に警告を出す
            let errorHtml = initErrorMsg ? `<div class="error-notice">⚠️ エラー発生: ${initErrorMsg}</div>` : '';

            document.getElementById('mainContent').innerHTML = `
                <div class="login-container">
                    <h2 style="text-align:center; color: var(--primary); font-weight:900; margin-bottom:25px;">KOYOCASINO LOGIN</h2>
                    
                    ${errorHtml}
                    
                    <input type="email" id="authEmail" placeholder="メールアドレス">
                    <input type="password" id="authPassword" placeholder="パスワード">
                    <input type="text" id="authUsername" placeholder="ユーザーネーム (※新規登録時)">
                    
                    <button class="btn-primary" style="margin-top:10px; padding:14px;" onclick="handleAuth('login')">ログイン</button>
                    <div style="text-align:center; margin-top: 20px;">
                        <a href="#" style="color: var(--text-muted); font-size:13px;" onclick="handleAuth('signup')">新規アカウントを作成する</a>
                    </div>
                </div>
            `;
        }

        async function handleAuth(type) {
            if (!supabaseClient) return alert("Supabaseが初期化されていないため通信できません。");
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            const username = document.getElementById('authUsername').value.trim();

            if (type === 'signup') {
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) return alert(error.message);
                if (data.user) {
                    await supabaseClient.from('profiles').insert([{ id: data.user.id, username: username, balance: 1000.00 }]);
                    alert("アカウント作成成功！ログインしてください。");
                }
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) return alert(error.message);
                location.reload();
            }
        }

        async function logout() { await supabaseClient.auth.signOut(); location.reload(); }
    </script>
</body>
</html>
